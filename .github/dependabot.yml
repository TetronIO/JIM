# Dependabot configuration for JIM
# Automatically manages dependency updates for NuGet packages, Docker images, and GitHub Actions
version: 2
updates:
  # .NET NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Ignore all major version updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group .NET runtime and SDK updates together
      dotnet-runtime:
        patterns:
          - "Microsoft.NETCore.*"
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
      # Group EF Core updates together
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
      # Group testing dependencies
      testing:
        patterns:
          - "NUnit*"
          - "Moq*"
          - "coverlet*"
          - "Microsoft.NET.Test.Sdk"
      # Group Blazor/UI dependencies
      blazor-ui:
        patterns:
          - "MudBlazor*"
          - "Microsoft.AspNetCore.Components*"
      # Group Azure Functions dependencies
      azure-functions:
        patterns:
          - "Microsoft.Azure.Functions*"
          - "Microsoft.Azure.WebJobs*"

  # Docker base images (digest-pinned for reproducible builds)
  # Dependabot will propose PRs to update digests when new images are published.
  # IMPORTANT: When a digest update is merged, you must also update the pinned
  # apt package versions in the corresponding Dockerfile to match the new base image.
  # Run: docker run --rm <image>@<new-digest> bash -c "apt-get update -qq && apt-cache policy <pkg>"
  #
  # Add new Dockerfile directories to the list below; Dependabot does not recurse.
  #
  # Polled daily so that upstream base image rebuilds (Microsoft rebuilds .NET
  # images within 12 hours of an Ubuntu noble update, and on the second Tuesday
  # of each month for lower-severity CVEs) are picked up promptly. JIM's own
  # release cadence acts as the natural cooling-off window.
  - package-ecosystem: "docker"
    directories:
      - "/src/JIM.Web"
      - "/src/JIM.Worker"
      - "/src/JIM.Scheduler"
      - "/.devcontainer"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-base-images:
        patterns:
          - "mcr.microsoft.com/dotnet/*"

  # Docker Compose images (PostgreSQL)
  # The digest-pinned postgres image in docker-compose.yml is the single source of truth —
  # Build-ReleaseBundle.ps1 reads it automatically, so updating here updates the bundle too.
  # Polled daily for the same reason as the base images above.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
    ignore:
      # Ignore all major version updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
