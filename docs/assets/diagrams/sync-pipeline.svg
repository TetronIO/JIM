<!-- The synchronisation pipeline (Concepts > Sync Pipeline hero; also reused -->
<!-- on Configuration > Connected Systems): data is staged in the connector -->
<!-- space either side of the Metaverse. -->
<!-- Hand-authored inline SVG, themed by the .jimdg-* classes in -->
<!-- docs/assets/stylesheets/custom.css (single source, light + dark). -->
<!-- Visual language: engineering/DESIGN.md > Diagrams. -->
<!-- NOTE: keep this file free of blank lines AND of comments inside the -->
<!-- <svg> element; it is inlined into markdown via pymdownx.snippets, and -->
<!-- python-markdown ends the raw-HTML block at either. Structure is -->
<!-- expressed with <g> groups instead. -->
<svg class="jim-diagram" viewBox="0 0 1160 260" role="img" aria-labelledby="jimdg-sp-title jimdg-sp-desc" xmlns="http://www.w3.org/2000/svg">
  <title id="jimdg-sp-title">The synchronisation pipeline</title>
  <desc id="jimdg-sp-desc">Data flows from a source system into JIM, where it is staged in the connector space as Connected System Objects. Inbound synchronisation reconciles the staged objects into the Metaverse, the single source of truth holding Metaverse Objects. Outbound synchronisation stages changes in the target's connector space, and export sends them to the target system.</desc>
  <g id="jimdg-sp-jim">
    <rect class="jimdg-hub" x="260" y="20" width="640" height="220" rx="8"/>
    <text class="jimdg-hub-title" x="580" y="52">JIM</text>
    <rect class="jimdg-stage" x="284" y="90" width="160" height="110" rx="8"/>
    <text class="jimdg-stage-label" x="364" y="124">Connector Space</text>
    <text class="jimdg-system-sub" x="364" y="148">staging area</text>
    <text class="jimdg-system-sub" x="364" y="167">CSOs</text>
    <rect class="jimdg-core" x="490" y="90" width="180" height="110" rx="8"/>
    <text class="jimdg-core-title" x="580" y="130">Metaverse</text>
    <text class="jimdg-core-sub" x="580" y="156">MVOs · fused identities</text>
    <rect class="jimdg-stage" x="716" y="90" width="160" height="110" rx="8"/>
    <text class="jimdg-stage-label" x="796" y="124">Connector Space</text>
    <text class="jimdg-system-sub" x="796" y="148">staging area</text>
    <text class="jimdg-system-sub" x="796" y="167">CSOs</text>
  </g>
  <g id="jimdg-sp-systems">
    <rect class="jimdg-system" x="20" y="113" width="190" height="64" rx="8"/>
    <text class="jimdg-system-name" x="115" y="141">Source System</text>
    <text class="jimdg-system-sub" x="115" y="162">HR · directories · files</text>
    <rect class="jimdg-system" x="950" y="113" width="190" height="64" rx="8"/>
    <text class="jimdg-system-name" x="1045" y="141">Target System</text>
    <text class="jimdg-system-sub" x="1045" y="162">directories · applications</text>
  </g>
  <g id="jimdg-sp-edges">
    <line class="jimdg-spoke" x1="210" y1="145" x2="274" y2="145"/>
    <polygon class="jimdg-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(284,145) rotate(0)"/>
    <text class="jimdg-spoke-label jimdg-anchor-end" x="252" y="133">import</text>
    <line class="jimdg-flow" x1="444" y1="145" x2="480" y2="145"/>
    <polygon class="jimdg-flow-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(490,145) rotate(0)"/>
    <text class="jimdg-flow-label jimdg-anchor-middle" x="467" y="226">inbound sync</text>
    <line class="jimdg-flow" x1="670" y1="145" x2="706" y2="145"/>
    <polygon class="jimdg-flow-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(716,145) rotate(0)"/>
    <text class="jimdg-flow-label jimdg-anchor-middle" x="693" y="226">outbound sync</text>
    <line class="jimdg-spoke" x1="876" y1="145" x2="940" y2="145"/>
    <polygon class="jimdg-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(950,145) rotate(0)"/>
    <text class="jimdg-spoke-label jimdg-anchor-start" x="908" y="133">export</text>
  </g>
  <g id="jimdg-sp-packets">
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="2.2s" begin="0s" repeatCount="indefinite" path="M210,145 L272,145"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="1.6s" begin="-0.8s" repeatCount="indefinite" path="M444,145 L478,145"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.6s" begin="-0.8s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="1.6s" begin="-1.6s" repeatCount="indefinite" path="M670,145 L704,145"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="1.6s" begin="-1.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="2.2s" begin="-0.4s" repeatCount="indefinite" path="M876,145 L938,145"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" begin="-0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
