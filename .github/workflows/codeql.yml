# CodeQL static analysis - scans for security vulnerabilities and code quality issues
# Replaces GitHub's default CodeQL setup to produce a single predictable workflow run
# with stable check names for the branch protection ruleset.
#
# Languages: actions (GitHub Actions workflows), csharp, javascript-typescript

name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'actions', 'csharp', 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - name: Initialize CodeQL
      uses: github/codeql-action/init@411c4c9a36b3fca4d674f06b6396b2c6d23522c6  # v3.36.3
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Autobuild
      uses: github/codeql-action/autobuild@02c5e83432fe5497fd85b873b6c9f16a8578e1d9  # v3.37.0

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@411c4c9a36b3fca4d674f06b6396b2c6d23522c6  # v3.36.3
      with:
        category: "/language:${{ matrix.language }}"
