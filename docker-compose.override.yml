services:
  jim.web:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      # Override JIM_DB_HOSTNAME from .env to use bundled database container
      - JIM_DB_HOSTNAME=jim.database
      - JIM_INFRASTRUCTURE_API_KEY=${JIM_INFRASTRUCTURE_API_KEY:-}
      # SSO authority has two faces in the devcontainer:
      #   - JIM_SSO_AUTHORITY is the backend-facing URL. JIM.Web and the JWT
      #     bearer middleware use it for JWKS / OIDC metadata fetches over the
      #     Docker network, hence Docker DNS `jim.keycloak:8080`.
      #   - JIM_SSO_PUBLIC_AUTHORITY is the browser/client-facing URL returned
      #     by the /api/v1/auth/config endpoint to clients like the PowerShell
      #     module running on the host, which reach Keycloak via the port-
      #     forwarded `localhost:8181`.
      # Keycloak itself is configured with KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      # so it returns the right endpoint URLs to each caller based on Host.
      - JIM_SSO_AUTHORITY=http://jim.keycloak:8080/realms/jim
      - JIM_SSO_PUBLIC_AUTHORITY=http://localhost:8181/realms/jim
      # JIM_SSO_CLIENT_ID=jim-web comes from .env and is the confidential client
      # used by the Blazor UI. Keycloak does not allow a single client to be both
      # confidential (with a secret) and public (PKCE/loopback), so the PowerShell
      # module uses a separate public client 'jim-powershell' defined in the
      # bundled realm. JIM_SSO_PUBLIC_CLIENT_ID tells the /api/v1/auth/config
      # endpoint to advertise that public client to interactive clients.
      - JIM_SSO_PUBLIC_CLIENT_ID=jim-powershell
      # OpenLDAP TLS configuration for LDAPS connections
      - LDAPTLS_REQCERT=never
    ports:
      - "5200:80"
    depends_on:
      jim.keycloak:
        condition: service_healthy
  jim.worker:
    environment:
      # Override JIM_DB_HOSTNAME from .env to use bundled database container
      - JIM_DB_HOSTNAME=jim.database
      # OpenLDAP TLS configuration for LDAPS connections
      - LDAPTLS_REQCERT=never
    volumes:
      # Expose worker logs for metrics streaming (integration tests)
      - ./test/integration/results/logs/worker:/var/log/jim

  jim.scheduler:
    environment:
      # Override JIM_DB_HOSTNAME from .env to use bundled database container
      - JIM_DB_HOSTNAME=jim.database

  # Development PostgreSQL settings - sized for dev environments (~8-16GB RAM)
  # shm_size must be >= shared_buffers (256MB + headroom) - see docker-compose.yml for production guidance
  # statement_timeout=300000 (5 minutes) prevents runaway queries
  # log_min_duration_statement (JIM_DB_LOG_MIN_DURATION, default 500ms) logs slow queries for dev analysis
  # logging_collector + jsonlog writes structured JSON logs to the shared log volume for the Logs UI
  jim.database:
    shm_size: '512mb'
    environment:
      # Override LANG from .env - PostgreSQL doesn't have en_GB.UTF-8 locale installed
      - LANG=C
    volumes:
      - jim-logs-volume:/var/log/jim
    entrypoint: ["/bin/bash", "-c", "mkdir -p /var/log/jim/database && chown postgres:postgres /var/log/jim/database && exec docker-entrypoint.sh \"$$@\"", "--"]
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all -c max_connections=100 -c shared_buffers=256MB -c effective_cache_size=1GB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=8MB -c default_statistics_target=100 -c random_page_cost=1.1 -c work_mem=4MB -c min_wal_size=80MB -c max_wal_size=1GB -c statement_timeout=300000 -c log_min_duration_statement=${JIM_DB_LOG_MIN_DURATION:-500} -c logging_collector=on -c log_destination=jsonlog -c log_directory=/var/log/jim/database -c log_filename=jim.database.%Y%m%d.log -c log_rotation_age=1440 -c log_rotation_size=0 -c log_file_mode=0644
    # Expose PostgreSQL port for local database tools (VS Code extensions, etc.)
    ports:
      - "5432:5432"

  # Bundled Keycloak IdP for zero-config SSO in development.
  # Pre-configured with a 'jim' realm, test users (admin/admin, user/user),
  # and clients for the web UI (jim-web) and PowerShell module (jim-powershell).
  # Admin console: http://localhost:8181 (admin/admin)
  jim.keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: jim.keycloak
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Hostname v2 configuration (Keycloak 25+):
      #
      # KC_HOSTNAME sets the public/frontchannel URL advertised to browsers in
      # the discovery document, token issuer claims and all redirect endpoints.
      # Setting it to the browser-reachable URL means JIM.Web does not need to
      # rewrite Docker-DNS hostnames before redirecting the user.
      #
      # KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true is CRITICAL when JIM.Web reaches
      # Keycloak over a different URL than the browser does (e.g. jim.web
      # container uses Docker DNS `jim.keycloak:8080`, browser uses
      # `localhost:8181`). Without this, Hostname v2 returns the same
      # KC_HOSTNAME URLs for back-channel requests, causing JIM.Web's token,
      # userinfo and JWKS calls from within the Docker network to fail with
      # "Connection refused" because `localhost` inside a container is not
      # the Keycloak container. With it, Keycloak derives back-channel URLs
      # from the request's Host header, so JIM.Web sees `jim.keycloak:8080`
      # endpoints while the browser sees `localhost:8181` endpoints.
      #
      # KC_HOSTNAME_STRICT=false disables strict hostname validation so that
      # requests with a Host header that doesn't match KC_HOSTNAME (e.g. the
      # back-channel Docker DNS requests) are accepted.
      KC_HOSTNAME: http://localhost:8181
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./.devcontainer/keycloak/jim-realm.json:/opt/keycloak/data/import/jim-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; timeout 1 cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - jim-network
