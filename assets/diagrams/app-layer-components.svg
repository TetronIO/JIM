  </g>
  <g id="jimdg-al-packets">
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="2.2s" begin="0s" repeatCount="indefinite" path="M270,84 L372,201"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="2.2s" begin="-1.1s" repeatCount="indefinite" path="M890,84 L797,201"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.2s" begin="-1.1s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
      <animateMotion dur="2.4s" begin="-0.6s" repeatCount="indefinite" path="M350,614 L510,700"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" begin="-0.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="jimdg-packet" r="4.5">
