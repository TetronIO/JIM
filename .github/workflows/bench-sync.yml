name: JIM-Bench Schema Sync

# Notify the JIM-Bench repo when JIM-side span enrichment, submission payload,
# or host fingerprinting contracts change. The receiver workflow in JIM-Bench
# processes the change context and creates update PRs as needed.

on:
  push:
    branches: [main]
    paths:
      - 'src/JIM.Worker/Processors/Sync*Processor.cs'
      - 'src/JIM.Application/Servers/ExportExecutionServer.cs'
      - 'test/integration/Submit-TestResults.ps1'
      - 'test/integration/Get-HostFingerprint.ps1'
      - 'test/integration/Stream-WorkerLogs.ps1'

# Principle of least privilege: this workflow only reads the repo (to checkout
# and git diff) and dispatches to JIM-Bench via a separate PAT stored in
# secrets.JIM_BENCH_DISPATCH_TOKEN. The default GITHUB_TOKEN needs no writes.
permissions:
  contents: read

jobs:
  notify-bench-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 2

      - name: Build change context
        id: changes
        run: |
          # Get list of changed files matching our paths
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- \
            'src/JIM.Worker/Processors/Sync*Processor.cs' \
            'src/JIM.Application/Servers/ExportExecutionServer.cs' \
            'test/integration/Submit-TestResults.ps1' \
            'test/integration/Get-HostFingerprint.ps1' \
            'test/integration/Stream-WorkerLogs.ps1' | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # Get diff summary for the changed files
          DIFF_SUMMARY=$(git diff HEAD~1 HEAD -- \
            'src/JIM.Worker/Processors/Sync*Processor.cs' \
            'src/JIM.Application/Servers/ExportExecutionServer.cs' \
            'test/integration/Submit-TestResults.ps1' \
            'test/integration/Get-HostFingerprint.ps1' \
            'test/integration/Stream-WorkerLogs.ps1' | head -200)

          echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          # Write diff to file to avoid shell escaping issues
          echo "$DIFF_SUMMARY" > /tmp/diff_summary.txt

      - name: Check for dispatch token
        id: check_token
        run: |
          if [ -z "${{ secrets.JIM_BENCH_DISPATCH_TOKEN }}" ]; then
            echo "::warning::JIM_BENCH_DISPATCH_TOKEN secret is not configured. Skipping dispatch to TetronIO/JIM-Bench. Configure the secret (a GitHub PAT with repo scope on TetronIO/JIM-Bench) to enable cross-repo sync."
            echo "token_available=false" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch to JIM-Bench
        if: steps.check_token.outputs.token_available == 'true'
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.JIM_BENCH_DISPATCH_TOKEN }}
          repository: TetronIO/JIM-Bench
          event-type: jim-contract-changed
          client-payload: |
            {
              "commit_sha": "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "changed_files": ${{ steps.changes.outputs.changed_files }},
              "diff_summary_truncated": true
            }
