# Dependabot configuration for JIM
# Automatically manages dependency updates for NuGet packages, Docker images, and GitHub Actions
version: 2
updates:
  # .NET NuGet dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Ignore all major version updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group .NET runtime and SDK updates together
      dotnet-runtime:
        patterns:
          - "Microsoft.NETCore.*"
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
      # Group EF Core updates together
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
      # Group testing dependencies
      testing:
        patterns:
          - "NUnit*"
          - "Moq*"
          - "coverlet*"
          - "Microsoft.NET.Test.Sdk"
      # Group Blazor/UI dependencies
      blazor-ui:
        patterns:
          - "MudBlazor*"
          - "Microsoft.AspNetCore.Components*"
      # Group Azure Functions dependencies
      azure-functions:
        patterns:
          - "Microsoft.Azure.Functions*"
          - "Microsoft.Azure.WebJobs*"

  # Docker base images (digest-pinned for reproducible builds)
  #
  # Each production Dockerfile has its own `package-ecosystem: docker` block
  # below. This is intentional: the earlier `directories:` (plural) form with
  # a single group was producing one PR per FROM line (six PRs per upstream
  # rebuild) because of dependabot-core#10428, where the docker ecosystem
  # intermittently fails to apply group configuration across multiple
  # directories. Splitting into one block per Dockerfile sidesteps that bug
  # and guarantees one grouped PR per Dockerfile. When #10428 is fixed, this
  # can be collapsed back into a single block.
  #
  # IMPORTANT: When a digest update is merged, you must also update the pinned
  # apt package versions in the corresponding Dockerfile to match the new base
  # image. Run:
  #   docker run --rm <image>@<new-digest> bash -c "apt-get update -qq && apt-cache policy <pkg>"
  #
  # Detection of available apt pin updates is automated by the apt-pin-check
  # workflow (.github/workflows/apt-pin-check.yml), which raises a PR when a
  # newer, installable version is published. Dependabot cannot do this itself:
  # its docker ecosystem only parses FROM lines, not `pkg=version` inside RUN.
  #
  # Polled daily so that upstream base image rebuilds (Microsoft rebuilds .NET
  # images within 12 hours of an Ubuntu noble update, and on the second Tuesday
  # of each month for lower-severity CVEs) are picked up promptly. JIM's own
  # release cadence acts as the natural cooling-off window.

  # JIM.Web Dockerfile (dotnet/aspnet + dotnet/sdk)
  - package-ecosystem: "docker"
    directory: "/src/JIM.Web"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-base-images:
        patterns:
          - "mcr.microsoft.com/dotnet/*"

  # JIM.Worker Dockerfile (dotnet/runtime + dotnet/sdk)
  - package-ecosystem: "docker"
    directory: "/src/JIM.Worker"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-base-images:
        patterns:
          - "mcr.microsoft.com/dotnet/*"

  # JIM.Scheduler Dockerfile (dotnet/runtime + dotnet/sdk)
  - package-ecosystem: "docker"
    directory: "/src/JIM.Scheduler"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dotnet-base-images:
        patterns:
          - "mcr.microsoft.com/dotnet/*"

  # .devcontainer Dockerfile: single image (mcr.microsoft.com/devcontainers/dotnet);
  # no group needed, and it does not match the dotnet-base-images pattern above.
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Docker Compose: PostgreSQL (in docker-compose.yml) and Keycloak (in
  # docker-compose.override.yml, used for development SSO).
  #
  # Uses the GA `docker-compose` ecosystem, which shipped on 2025-02-25. The
  # previous `docker` ecosystem block failed every scheduled run because
  # Dependabot's `docker` ecosystem only scans Dockerfiles and Kubernetes YAML;
  # it never read compose files, despite the comment claiming otherwise. The
  # digest-pinned postgres image in docker-compose.yml is the single source of
  # truth for the release bundle (Build-ReleaseBundle.ps1 reads it directly).
  #
  # Scoped via `exclude-paths` to only `docker-compose.yml` (postgres digest
  # updates) and `docker-compose.override.yml` (Keycloak SSO version updates).
  # The local compose overlay is deliberately not tracked (it contains no
  # trackable pinned images). The integration-tests compose
  # (test/integration/docker/) and production compose (deploy/) live outside the
  # scanned root directory and so are not seen by this non-recursive scan at all;
  # this is intentional (integration-tests images are chosen for compatibility
  # testing and should not be auto-bumped, and production contains no trackable
  # pinned images). Remove a filename from exclude-paths if you want its images
  # monitored too.
  #
  # Polled daily for the same reason as the base images above.
  - package-ecosystem: "docker-compose"
    directory: "/"
    exclude-paths:
      - "docker-compose.local.yml"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # npm packages used by diagram tooling (engineering/diagrams/structurizr/).
  #
  # Currently the only npm manifest in the repo; puppeteer is the sole direct
  # dependency, but its proxy-agent stack pulls in transitive packages
  # (basic-ftp, ip-address) that periodically need security patches. This
  # manifest has needed manual override edits five times to date because no
  # automated update loop existed; adding the ecosystem here so Dependabot
  # proposes PRs for both version updates and security advisories going
  # forward, on the same review-required cadence as every other ecosystem.
  # Weekly schedule matching NuGet and Actions. Major-version bumps ignored
  # per the project-wide policy.
  - package-ecosystem: "npm"
    directory: "/engineering/diagrams/structurizr"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Devcontainer Features (.devcontainer/devcontainer.json).
  #
  # Each Feature is a third-party script that runs as root during devcontainer
  # image build, so it sits in the same supply-chain risk class as base images
  # and NuGet packages. Pinned by colon-tag in devcontainer.json with resolved
  # digests captured in devcontainer-lock.json; Dependabot proposes weekly PRs
  # when upstream Features publish new versions. Polled weekly (not daily) like
  # NuGet and Actions since Features change infrequently and each bump needs a
  # full devcontainer rebuild to validate.
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    reviewers:
      - "TetronIO/jim-maintainers"
    commit-message:
      prefix: "chore"
    ignore:
      # Ignore all major version updates
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
