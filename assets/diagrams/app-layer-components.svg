    <polygon class="jimdg-flow-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(350,340) rotate(141.3)"/>
    <line class="jimdg-flow" x1="425" y1="280" x2="690.2" y2="337.9"/>
    <polygon class="jimdg-flow-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(700,340) rotate(12.3)"/>
    <line class="jimdg-flow" x1="750" y1="280" x2="802.9" y2="332.9"/>
    <polygon class="jimdg-flow-arrow" points="0,0 -10,-5.5 -10,5.5" transform="translate(810,340) rotate(45)"/>
    <line class="jimdg-flow" x1="350" y1="490" x2="350" y2="540"/>
