# Release workflow for JIM
# Triggered by pushing a tag like v0.2.0
#
# This workflow:
# 1. Validates the build, tests, and version consistency
# 2. Builds, scans, smoke-tests, and pushes Docker images to ghcr.io
# 3. Publishes PowerShell module to PSGallery
# 4. Creates an air-gapped release bundle
# 5. Creates a GitHub Release with all assets

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write
  id-token: write    # For cosign signing
  attestations: write # For SLSA provenance

jobs:
  # Job 1: Validate build, tests, and version consistency
  validate:
    name: Validate Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Phase 1: Version validation gate
      - name: Validate version consistency
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Version mismatch: tag is v${TAG_VERSION} but VERSION file contains ${FILE_VERSION}"
            exit 1
          fi
          echo "Version validated: ${TAG_VERSION}"

      - name: Validate PowerShell manifest version
        shell: pwsh
        run: |
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          $numericVersion = ($tagVersion -split '-')[0]  # Strip prerelease suffix
          $manifest = Import-PowerShellDataFile './src/JIM.PowerShell/JIM.psd1'
          if ($manifest.ModuleVersion -ne $numericVersion) {
            Write-Error "PowerShell manifest version ($($manifest.ModuleVersion)) does not match tag ($numericVersion)"
            exit 1
          }
          Write-Host "PowerShell manifest version validated: $numericVersion"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore JIM.sln

      - name: Build
        run: dotnet build JIM.sln --no-restore --configuration Release

      - name: Run .NET tests
        run: dotnet test JIM.sln --no-build --configuration Release --verbosity normal

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser
          $config = New-PesterConfiguration
          $config.Run.Path = './src/JIM.PowerShell/Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  # Job 2: Build, scan, smoke-test, and push Docker images
  build-containers:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        include:
          - image: jim-web
            dockerfile: src/JIM.Web/Dockerfile
            smoke-test: http
          - image: jim-worker
            dockerfile: src/JIM.Worker/Dockerfile
            smoke-test: log
            startup-log: "Starting JIM.Worker"
          - image: jim-scheduler
            dockerfile: src/JIM.Scheduler/Dockerfile
            smoke-test: log
            startup-log: "Starting JIM.Scheduler"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix
        id: prefix
        run: echo "IMAGE_PREFIX=$(echo 'ghcr.io/${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Phase 8: Docker layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      # Phase 3 & 4: Build locally first, scan, smoke-test, then push
      - name: Build Docker image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      # Phase 3: Container vulnerability scanning
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # Phase 4: Smoke test — HTTP health check for jim-web, startup log inspection for worker/scheduler
      - name: Smoke test container (HTTP)
        if: matrix.smoke-test == 'http'
        run: |
          IMAGE="${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}"

          docker run -d --name smoke-test \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -e ASPNETCORE_URLS=http://+:80 \
            -p 8080:80 \
            "$IMAGE"

          # Wait for container to start (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health/live 2>/dev/null; then
              echo "Health check passed"
              docker rm -f smoke-test
              exit 0
            fi
            sleep 1
          done

          echo "::error::Container failed to pass health check within 30 seconds"
          docker logs smoke-test
          docker rm -f smoke-test
          exit 1

      - name: Smoke test container (log)
        if: matrix.smoke-test == 'log'
        run: |
          IMAGE="${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}"

          # Start with dummy config — the service will log its startup
          # message before attempting database connection
          docker run -d --name smoke-test \
            -e JIM_DB_HOSTNAME=localhost \
            -e JIM_DB_NAME=jim \
            -e JIM_DB_USERNAME=jim \
            -e JIM_DB_PASSWORD=dummy \
            -e JIM_LOG_LEVEL=Information \
            "$IMAGE"

          # Wait up to 10 seconds for the startup log message
          for i in $(seq 1 10); do
            if docker logs smoke-test 2>&1 | grep -q "${{ matrix.startup-log }}"; then
              echo "Startup log found: ${{ matrix.startup-log }}"
              docker rm -f smoke-test
              exit 0
            fi
            sleep 1
          done

          echo "::error::Container did not log expected startup message within 10 seconds"
          docker logs smoke-test
          docker rm -f smoke-test
          exit 1

      # Push the image (after scan and smoke test pass)
      - name: Push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          IMAGE_REF="${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}"
          cosign sign --yes "${IMAGE_REF}@${{ steps.build.outputs.digest }}"

      # Phase 6a: SBOM generation
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attach SBOM to image
        run: |
          IMAGE_REF="${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}"
          cosign attest --yes --type spdxjson \
            --predicate sbom-${{ matrix.image }}.spdx.json \
            "${IMAGE_REF}@${{ steps.build.outputs.digest }}"

      # Phase 6b: SLSA provenance attestation
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.prefix.outputs.IMAGE_PREFIX }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Phase 6c: Upload SBOM as artifact for GitHub Release
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json
          retention-days: 5

  # Job 3: Publish PowerShell module to PSGallery
  # Depends on build-containers to ensure nothing publishes if Docker builds fail
  publish-powershell:
    name: Publish PowerShell Module
    runs-on: ubuntu-latest
    needs: [validate, build-containers]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update module version
        shell: pwsh
        run: |
          $manifestPath = './src/JIM.PowerShell/JIM.psd1'
          $fullVersion = '${{ steps.version.outputs.VERSION }}'

          # Split version and prerelease (e.g., "0.3.0-alpha" -> "0.3.0" + "alpha")
          if ($fullVersion -match '^(\d+\.\d+\.\d+)(?:-(.+))?$') {
            $moduleVersion = $Matches[1]
            $prerelease = $Matches[2]
          } else {
            throw "Invalid version format: $fullVersion"
          }

          # Read the manifest content
          $content = Get-Content $manifestPath -Raw

          # Update ModuleVersion (numeric part only - PSGallery requires X.Y.Z format)
          $content = $content -replace "ModuleVersion\s*=\s*'[^']*'", "ModuleVersion = '$moduleVersion'"

          # Update or set Prerelease tag
          if ($prerelease) {
            # Set prerelease (uncomment if commented, or update value)
            $content = $content -replace "#?\s*Prerelease\s*=\s*'[^']*'", "Prerelease = '$prerelease'"
            Write-Host "Set Prerelease to '$prerelease'"
          } else {
            # Remove prerelease (comment it out)
            $content = $content -replace "(\s*)Prerelease\s*=\s*'[^']*'", "`$1# Prerelease = ''"
            Write-Host "Removed Prerelease (stable release)"
          }

          # Write back
          Set-Content $manifestPath -Value $content

          Write-Host "Updated module version to $moduleVersion (full: $fullVersion)"

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            Write-Warning "PSGALLERY_API_KEY not set - skipping PSGallery publish"
            exit 0
          }

          $fullVersion = '${{ steps.version.outputs.VERSION }}'

          # Check if this version already exists on PSGallery (idempotency for re-runs)
          $existing = Find-Module -Name JIM -RequiredVersion $fullVersion -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Version $fullVersion already published to PSGallery - skipping"
            exit 0
          }

          # Publish-Module requires the folder name to match the module name ('JIM')
          $stagingPath = './publish-staging/JIM'
          New-Item -ItemType Directory -Path $stagingPath -Force | Out-Null
          Copy-Item -Path './src/JIM.PowerShell/*' -Destination $stagingPath -Recurse -Exclude 'Tests'

          # Test the module can be imported
          Import-Module $stagingPath -Force

          # Publish to PSGallery
          Publish-Module -Path $stagingPath -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

  # Job 4: Create release bundle for air-gapped deployments
  create-bundle:
    name: Create Release Bundle
    runs-on: ubuntu-latest
    needs: build-containers

    outputs:
      bundle-name: ${{ steps.bundle.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release bundle
        id: bundle
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.VERSION }}'
          ./scripts/Build-ReleaseBundle.ps1 -Version $version -OutputPath ./release-output

          $bundleName = "jim-release-$version"
          echo "name=$bundleName" >> $env:GITHUB_OUTPUT

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: ./release-output/jim-release-${{ steps.version.outputs.VERSION }}.tar.gz
          retention-days: 5

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: ./release-output/jim-release-${{ steps.version.outputs.VERSION }}/checksums.sha256
          retention-days: 5

  # Job 5: Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-containers, publish-powershell, create-bundle]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: ./artifacts

      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: ./artifacts

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: ./artifacts/sbom
          merge-multiple: true

      # Phase 9b: Changelog extraction validation
      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.VERSION }}'
          $changelog = Get-Content ./CHANGELOG.md -Raw

          # Extract section for this version
          # Use (?s) (single-line) so . matches newlines, and \z for absolute end-of-string
          # This avoids (?m) multiline mode where $ matches every line boundary
          $pattern = "(?s)## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=\n## \[|\z)"
          if ($changelog -match $pattern) {
            $notes = $Matches[1].Trim()
          } else {
            Write-Error "No changelog section found for version $version. Ensure CHANGELOG.md has a ## [$version] section."
            exit 1
          }
          if ($notes.Length -lt 20) {
            Write-Warning "Changelog section for $version is suspiciously short ($($notes.Length) chars). Verify content."
          }

          # Write to file for GitHub CLI
          $notes | Set-Content ./release-notes.md
          Write-Host "Release notes:"
          Write-Host $notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          gh release create "v${VERSION}" \
            --title "JIM v${VERSION}" \
            --notes-file ./release-notes.md \
            ./artifacts/jim-release-${VERSION}.tar.gz \
            ./artifacts/checksums.sha256 \
            ./artifacts/sbom/*.spdx.json \
            ./docker-compose.yml \
            ./docker-compose.production.yml \
            ./.env.example
